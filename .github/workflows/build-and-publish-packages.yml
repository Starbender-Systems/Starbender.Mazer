name: Build And Publish Packages

on:
  push:
    branches:
      - development
      - main
  pull_request:
    branches:
      - development
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-pack-publish:
    runs-on: ubuntu-latest
    env:
      SOLUTION_FILE: Starbender.Mazer.slnx
      PACKAGE_OUTPUT_DIR: artifacts/nuget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore "$SOLUTION_FILE"

      - name: Build solution
        run: dotnet build "$SOLUTION_FILE" --configuration Release --no-restore

      - name: Pack projects under src
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$PACKAGE_OUTPUT_DIR"

          target_branch="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            target_branch="${GITHUB_BASE_REF}"
          fi

          is_development_prerelease=false
          if [ "$target_branch" = "development" ]; then
            is_development_prerelease=true
            echo "Using prerelease package versions with suffix: prerelease-${GITHUB_RUN_NUMBER}"
          fi

          mapfile -d '' projects < <(find src -name '*.csproj' -print0 | sort -z)
          if [ "${#projects[@]}" -eq 0 ]; then
            echo "No .csproj files found under src/"
            exit 1
          fi

          for project in "${projects[@]}"; do
            echo "Packing $project"
            if [ "$is_development_prerelease" = "true" ]; then
              current_version="$(dotnet msbuild "$project" -nologo -getProperty:Version | awk 'NF { last=$0 } END { print last }')"
              if [ -z "$current_version" ]; then
                echo "Could not resolve Version for $project"
                exit 1
              fi

              prerelease_version="${current_version}-prerelease-${GITHUB_RUN_NUMBER}"
              echo "Resolved package version: $prerelease_version"
              dotnet pack "$project" --configuration Release --no-build --output "$PACKAGE_OUTPUT_DIR" -p:PackageVersion="$prerelease_version"
            else
              dotnet pack "$project" --configuration Release --no-build --output "$PACKAGE_OUTPUT_DIR"
            fi
          done

      - name: Upload NuGet package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg
          if-no-files-found: error

      - name: Detect merged pull request push
        if: github.event_name == 'push' && (github.ref_name == 'development' || github.ref_name == 'main')
        id: merged_pr_check
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.request(
              'GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls',
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                mediaType: {
                  previews: ['groot'],
                },
              }
            );

            const targetBranch = context.ref.replace('refs/heads/', '');
            const mergedPr = response.data.find((pr) => pr.merged_at && pr.base.ref === targetBranch);

            core.setOutput('should_publish', mergedPr ? 'true' : 'false');
            if (mergedPr) {
              core.info(`Publish enabled for merged PR #${mergedPr.number} into ${targetBranch}.`);
            } else {
              core.info(`Skipping publish because ${context.sha} is not associated with a merged PR into ${targetBranch}.`);
            }

      - name: Publish packages to NuGet.org
        if: github.event_name == 'push' && (github.ref_name == 'development' || github.ref_name == 'main') && steps.merged_pr_check.outputs.should_publish == 'true'
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NUGET_API_KEY}" ]; then
            echo "NUGET_API_KEY secret is not set."
            exit 1
          fi

          shopt -s nullglob
          for package in "$PACKAGE_OUTPUT_DIR"/*.nupkg "$PACKAGE_OUTPUT_DIR"/*.snupkg; do
            if [ -f "$package" ]; then
              echo "Publishing $package to NuGet.org"
              dotnet nuget push "$package" \
                --source "https://api.nuget.org/v3/index.json" \
                --api-key "${NUGET_API_KEY}" \
                --skip-duplicate
            fi
          done
